#Azure pipeline sample

trigger:
- master

pool:
  vmImage: 'ubuntu-latest'

stages:
- stage: Build
  displayName: 'Build Stage'
  jobs:
  - job: BuildJob
    displayName: 'BuildJob'
    steps:
    - script: echo 'from build'
  - job: TestJob
    displayName: 'Test Job'
    steps:
    - script: echo 'from test'
- stage: Deploy
  displayName: 'Deplay App'
  jobs:
  - job: Publish
    displayName: 'Publish App'
    steps:
      - script: echo 'publish app'


  - job: CreateArtifact
    displayName: 'Create artifact'
    steps:
      - script: echo 'create artifact'
- stage: GoToRCT
  displayName: 'Go to RCT'
  trigger: manual
  jobs:
    - job: ManualTask
      displayName: 'Tache manuelle'
      pool: server
      steps:
      - task: ManualValidation@1
        inputs:
          notifyUsers: 'adampecory@gmail.com'
          onTimeout: 'resume'
    - job: CopyToEnv
      displayName: 'Copy to Env'
      dependsOn: ManualTask
      steps:
        - script: echo 'copy to env'
